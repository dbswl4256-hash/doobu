<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="퍼나콘.png">
    <link rel="stylesheet" href="style.css">
    <title>두부 길드 - Official</title>
</head>
<body>
    <canvas id="snow-canvas"></canvas>

    <svg width="0" height="0" style="position: absolute;">
        <filter id="stamp-wavy">
            <feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="1" seed="5">
                <animate attributeName="baseFrequency" dur="20s" values="0.03; 0.035; 0.03" repeatCount="indefinite" />
            </feTurbulence>
            <feDisplacementMap in="SourceGraphic" scale="15" />
        </filter>
    </svg>

    <aside class="sidebar">
        <img src="두부로고2.png" class="side-logo" onclick="location.href='index.html'">
        <ul class="side-menu">
            <li><a href="#home">HOME</a></li>
            <li><a href="#intro">INTRO</a></li>
            <li><a href="#gallery">GALLERY</a></li>
            <li><a href="https://open.kakao.com/o/s037z0cf" target="_blank">CONTACT</a></li>
        </ul>
    </aside>

    <main class="content-wrapper">
        <section id="home" class="section">
            <div class="home-visual">
                <img src="두부0.png" class="stamp-img">
            </div>
            <h1 class="main-title">PLAYVILLE DOOBU</h1>
        </section>

        <section id="intro" class="section">
            <div class="info-card" style="width: 100%; margin-bottom: 30px; display: flex; gap: 40px; align-items: center;">
                <img src="두부홈.png" style="width: 350px; border-radius: 20px;">
                <div>
                    <h1 style="font-size: 2.5rem; color: #01579B;">두부 길드 소개</h1>
                    <p style="color:#03A9F4; font-weight:bold;">#내향인 전용 #조용한 성장 #가벼운 소통</p>
                </div>
            </div>
            <div class="info-grid">
                <div class="info-card">
                    <h2>가입 안내</h2>
                    <p>• 레벨 30 이상 (안뜰 19층 우대)<br>• 매너와 꾸준함을 겸비하신 분</p>
                </div>
                <div class="info-card">
                    <h2>길드 규칙</h2>
                    <p>• 일일 의뢰 및 기부 적극 권장<br>• 장기 미접 시 사전 통보 필수</p>
                </div>
            </div>
            <div class="btn-group">
                <a href="https://open.kakao.com/o/s037z0cf" target="_blank" class="cta-btn blue">가입신청 및 문의</a>
                <a href="https://cafe.naver.com/cafeplayville/26649" target="_blank" class="cta-btn green">카페 모집공지</a>
            </div>
        </section>

        <section id="gallery" class="section">
            <div class="info-card" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
                <h1 style="margin-bottom: 25px; color: #01579B;">GUILD ALBUM</h1>
                <div class="gallery-container">
                    <button class="nav-btn prev-btn" onclick="updateGallery(-1)">‹</button>
                    <img src="두부0.png" id="gallery-img" class="gallery-img">
                    <button class="nav-btn next-btn" onclick="updateGallery(1)">›</button>
                </div>
                <p id="page-info" style="margin-top: 20px; font-weight: 900; color: #03A9F4; font-size: 1.5rem;">1 / 5</p>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
